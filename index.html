<!-- milkdrop-lab.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Milkdrop Preset Lab</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff9c;
    font-family:monospace;
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
    width:420px;
    background:#111;
    border:1px solid #333;
    padding:8px;
    z-index:10;
}

#log{
    height:120px;
    overflow:auto;
    border:1px solid #222;
    background:#050505;
    padding:5px;
    margin-top:6px;
    font-size:12px;
}

#editor{
    width:100%;
    height:180px;
    background:#000;
    color:#00ff9c;
    border:1px solid #222;
    margin-top:6px;
}

button{
    background:#000;
    color:#00ff9c;
    border:1px solid #333;
    padding:4px 6px;
    cursor:pointer;
}

canvas{
    width:100vw;
    height:100vh;
}
</style>
</head>

<body>

<div id="ui">

<input type="file" id="file" accept=".milk">

<button id="reload">reload</button>

<span id="fps">FPS: 0</span>

<textarea id="editor" placeholder="Preset text appears here..."></textarea>

<div id="log"></div>

</div>

<canvas id="canvas"></canvas>

<script type="module">

import butterchurn from "https://cdn.skypack.dev/butterchurn";
import converter from "https://cdn.skypack.dev/milkdrop-preset-converter";

const canvas = document.getElementById("canvas");
const logBox = document.getElementById("log");
const editor = document.getElementById("editor");
const fpsLabel = document.getElementById("fps");

const audioCtx = new AudioContext();
const analyser = audioCtx.createAnalyser();

const visualizer = butterchurn.createVisualizer(audioCtx, canvas, {
    width: window.innerWidth,
    height: window.innerHeight
});

visualizer.connectAudio(analyser);

// dummy oscillator to feed audio input so visualizer runs
const osc = audioCtx.createOscillator();
osc.connect(analyser);
osc.start();

function log(msg){
    logBox.innerHTML += msg + "<br>";
    logBox.scrollTop = logBox.scrollHeight;
}

function loadPreset(text){
    try{
        const preset = converter(text);   // default export
        visualizer.loadPreset(preset,0);
        log("Preset loaded");
    }catch(e){
        log("ERROR: "+e);
    }
}

document.getElementById("file").addEventListener("change", async e => {
    const file = e.target.files[0];
    if(!file) return;

    const text = await file.text();
    editor.value = text;

    loadPreset(text);
});

document.getElementById("reload").onclick = () => {
    loadPreset(editor.value);
};

let last = performance.now();
let frames = 0;

function render(){
    requestAnimationFrame(render);
    visualizer.render();
    frames++;
    const now = performance.now();
    if(now-last>1000){
        fpsLabel.textContent = "FPS: "+frames;
        frames=0;
        last=now;
    }
}

render();

</script>

</body>
</html>

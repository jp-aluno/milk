<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Milkdrop Debug Lab - Dropdown + Drag&Drop</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff9c;
    font-family:monospace;
}
#ui{
    position:fixed;
    top:10px;
    left:10px;
    width:450px;
    background:#111;
    border:1px solid #333;
    padding:8px;
    z-index:10;
}
#log{
    height:120px;
    overflow:auto;
    border:1px solid #222;
    background:#050505;
    padding:5px;
    margin-top:6px;
    font-size:12px;
}
select, button{
    background:#000;
    color:#00ff9c;
    border:1px solid #333;
    padding:4px 6px;
    margin-right:4px;
    cursor:pointer;
}
canvas{
    width:100vw;
    height:100vh;
}
#dropHint{
    margin-top:6px;
    font-size:12px;
    color:#0f0;
}
</style>
</head>
<body>

<div id="ui">
<select id="presetDropdown">
    <option value="">-- Select Server Preset --</option>
</select>
<button id="reload">Reload Current</button>
<div id="dropHint">Drag & drop .milk file here</div>
<div id="log"></div>
</div>

<canvas id="canvas"></canvas>

<script type="module">
import butterchurn from "https://cdn.skypack.dev/butterchurn";
// Import server-hosted presets (download butterchurn-presets/presets/all.js to your server)
import * as Presets from './butterchurn-presets/presets/all.js';

const canvas = document.getElementById("canvas");
const logBox = document.getElementById("log");
const dropdown = document.getElementById("presetDropdown");

const audioCtx = new AudioContext();
const analyser = audioCtx.createAnalyser();

const visualizer = butterchurn.createVisualizer(audioCtx, canvas, {
    width: window.innerWidth,
    height: window.innerHeight
});
visualizer.connectAudio(analyser);

// Dummy oscillator to generate audio
const osc = audioCtx.createOscillator();
osc.connect(analyser);
osc.start();

function log(msg){
    logBox.innerHTML += msg + "<br>";
    logBox.scrollTop = logBox.scrollHeight;
    console.log(msg);
}

// Populate dropdown with server presets
Object.keys(Presets).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    dropdown.appendChild(opt);
});

// Load preset from dropdown or drag/drop
function loadPreset(preset){
    try {
        visualizer.loadPreset(preset, 0);
        log("Loaded preset: " + (preset.name || "unknown"));
    } catch(e){
        log("Error loading preset: " + e);
        console.error(e);
    }
}

// Dropdown change
dropdown.addEventListener('change', e => {
    const name = e.target.value;
    if(name && Presets[name]){
        loadPreset(Presets[name]);
    }
});

// Reload button
document.getElementById("reload").addEventListener('click', () => {
    const name = dropdown.value;
    if(name && Presets[name]){
        loadPreset(Presets[name]);
    }
});

// Drag-and-drop support for .milk files
function handleFile(file){
    const reader = new FileReader();
    reader.onload = () => {
        const text = reader.result;
        const preset = { preset: text }; // wrap raw .milk text
        try{
            visualizer.loadPreset(preset, 0);
            log("Loaded .milk preset: " + file.name);
        } catch(e){
            log("Error loading .milk preset: " + e);
            console.error(e);
        }
    };
    reader.readAsText(file);
}

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
    e.preventDefault();
    if(e.dataTransfer.files.length > 0){
        const file = e.dataTransfer.files[0];
        if(file.name.endsWith('.milk')){
            handleFile(file);
        } else {
            log("Not a .milk file: " + file.name);
        }
    }
});

// Render loop with FPS logging
let last = performance.now();
let frames = 0;

function render(){
    requestAnimationFrame(render);
    try { visualizer.render(); } catch(e){ console.error(e); }
    frames++;
    const now = performance.now();
    if(now - last > 1000){
        log("FPS: " + frames);
        frames=0;
        last=now;
    }
}
render();

// Resize
window.addEventListener('resize', () => {
    visualizer.resize(window.innerWidth, window.innerHeight);
});

log("Milkdrop Debug Lab initialized.");
</script>

</body>
</html>

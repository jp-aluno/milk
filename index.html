<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Milkdrop Preset Lab - Debug Version</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff9c;
    font-family:monospace;
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
    width:420px;
    background:#111;
    border:1px solid #333;
    padding:8px;
    z-index:10;
}

#log{
    height:160px;
    overflow:auto;
    border:1px solid #222;
    background:#050505;
    padding:5px;
    margin-top:6px;
    font-size:12px;
}

#editor{
    width:100%;
    height:180px;
    background:#000;
    color:#00ff9c;
    border:1px solid #222;
    margin-top:6px;
    font-family:monospace;
    font-size:12px;
}

button{
    background:#000;
    color:#00ff9c;
    border:1px solid #333;
    padding:4px 6px;
    cursor:pointer;
}

canvas{
    width:100vw;
    height:100vh;
}
</style>
</head>

<body>

<div id="ui">
<input type="file" id="file" accept=".milk">
<button id="reload">reload</button>
<span id="fps">FPS: 0</span>
<textarea id="editor" placeholder="Preset text appears here..."></textarea>
<div id="log"></div>
</div>

<canvas id="canvas"></canvas>

<script type="module">

import butterchurn from "https://cdn.skypack.dev/butterchurn";
import converter from "https://cdn.skypack.dev/milkdrop-preset-converter";

const canvas = document.getElementById("canvas");
const logBox = document.getElementById("log");
const editor = document.getElementById("editor");
const fpsLabel = document.getElementById("fps");

console.log("Initializing AudioContext...");
const audioCtx = new AudioContext();
const analyser = audioCtx.createAnalyser();

console.log("Creating Butterchurn visualizer...");
const visualizer = butterchurn.createVisualizer(audioCtx, canvas, {
    width: window.innerWidth,
    height: window.innerHeight
});
visualizer.connectAudio(analyser);

console.log("Starting dummy oscillator for audio input...");
const osc = audioCtx.createOscillator();
osc.connect(analyser);
osc.start();

function log(msg){
    logBox.innerHTML += msg + "<br>";
    logBox.scrollTop = logBox.scrollHeight;
    console.log(msg);
}

// Load preset with converter fallback
function loadPreset(text){
    console.log("Loading preset...");
    let preset;
    try{
        console.log("Attempting to convert preset with milkdrop-preset-converter...");
        preset = converter(text);   // default export
        console.log("Conversion successful.");
    } catch(e) {
        console.warn("Converter failed, loading raw preset text. Error:", e);
        preset = text;
    }

    try {
        visualizer.loadPreset(preset, 0);
        log("Preset loaded into visualizer.");
    } catch(e) {
        console.error("Failed to load preset into visualizer:", e);
        log("ERROR loading preset: " + e);
    }
}

document.getElementById("file").addEventListener("change", async e => {
    console.log("File input changed...");
    const file = e.target.files[0];
    if(!file){
        console.warn("No file selected.");
        return;
    }

    console.log("Reading file:", file.name);
    const text = await file.text();
    editor.value = text;
    console.log("File read successfully. Length:", text.length);
    loadPreset(text);
});

document.getElementById("reload").onclick = () => {
    console.log("Reload button clicked.");
    loadPreset(editor.value);
};

let last = performance.now();
let frames = 0;

function render(){
    requestAnimationFrame(render);

    try {
        visualizer.render();
    } catch(e) {
        console.error("Error during visualizer.render():", e);
    }

    frames++;

    const now = performance.now();
    if(now - last > 1000){
        fpsLabel.textContent = "FPS: " + frames;
        console.log("FPS:", frames);
        frames=0;
        last=now;
    }
}

console.log("Starting render loop...");
render();

window.addEventListener('resize', () => {
    console.log("Window resized:", window.innerWidth, window.innerHeight);
    visualizer.resize(window.innerWidth, window.innerHeight);
});

console.log("Milkdrop Debug Lab initialized.");

</script>

</body>
</html>

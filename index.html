<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Milkdrop Debug Lab - Presets + File Input</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff9c;
    font-family:monospace;
}
#ui{
    position:fixed;
    top:10px;
    left:10px;
    width:500px;
    background:#111;
    border:1px solid #333;
    padding:8px;
    z-index:10;
}
#log{
    height:120px;
    overflow:auto;
    border:1px solid #222;
    background:#050505;
    padding:5px;
    margin-top:6px;
    font-size:12px;
}
select, button, input{
    background:#000;
    color:#00ff9c;
    border:1px solid #333;
    padding:4px 6px;
    margin-right:4px;
    cursor:pointer;
}
canvas{
    width:100vw;
    height:100vh;
}
</style>
</head>
<body>

<div id="ui">
<select id="presetDropdown">
    <option value="">-- Select Server Preset --</option>
</select>
<button id="reload">Reload Current</button>
<input type="file" id="fileInput" accept=".milk">
<div id="log"></div>
</div>

<canvas id="canvas"></canvas>

<script type="module">
import butterchurn from "https://cdn.skypack.dev/butterchurn";
// Preset files are in root
import * as AllPresets from './all.js';
import * as BasePresets from './base.js';
import * as MinimalPresets from './minimal.js';

const canvas = document.getElementById("canvas");
const logBox = document.getElementById("log");
const dropdown = document.getElementById("presetDropdown");
const fileInput = document.getElementById("fileInput");

const audioCtx = new AudioContext();
const analyser = audioCtx.createAnalyser();

const visualizer = butterchurn.createVisualizer(audioCtx, canvas, {
    width: window.innerWidth,
    height: window.innerHeight
});
visualizer.connectAudio(analyser);

// Dummy oscillator
const osc = audioCtx.createOscillator();
osc.connect(analyser);
osc.start();

function log(msg){
    logBox.innerHTML += msg + "<br>";
    logBox.scrollTop = logBox.scrollHeight;
    console.log(msg);
}

// Merge all server presets
const Presets = {...AllPresets, ...BasePresets, ...MinimalPresets};

// Populate dropdown
Object.keys(Presets).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    dropdown.appendChild(opt);
});

// Load preset object
function loadPreset(presetObj, name){
    try {
        visualizer.loadPreset(presetObj, 0);
        log("Loaded preset: " + (name || "unknown"));
    } catch(e){
        log("Error loading preset: " + e);
        console.error(e);
    }
}

// Dropdown change
dropdown.addEventListener('change', e => {
    const name = e.target.value;
    if(name && Presets[name]){
        loadPreset(Presets[name], name);
    }
});

// Reload button
document.getElementById("reload").addEventListener('click', () => {
    const name = dropdown.value;
    if(name && Presets[name]){
        loadPreset(Presets[name], name);
    }
});

// File input handler for .milk files
fileInput.addEventListener('change', async e => {
    const file = e.target.files[0];
    if(!file) return;
    if(!file.name.endsWith('.milk')) {
        log("Not a .milk file: " + file.name);
        return;
    }
    const text = await file.text();
    const preset = { preset: text };
    loadPreset(preset, file.name);
});

// Render loop with FPS
let last = performance.now();
let frames = 0;
function render(){
    requestAnimationFrame(render);
    try { visualizer.render(); } catch(e){ console.error(e); }
    frames++;
    const now = performance.now();
    if(now - last > 1000){
        log("FPS: " + frames);
        frames=0;
        last=now;
    }
}
render();

// Resize
window.addEventListener('resize', () => {
    visualizer.resize(window.innerWidth, window.innerHeight);
});

log("Milkdrop Debug Lab initialized.");
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Milkdrop Loader</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff9c;
    font-family:monospace;
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
    background:#111;
    border:1px solid #333;
    padding:10px;
    z-index:10;
}

#log{
    margin-top:6px;
    height:120px;
    width:320px;
    overflow:auto;
    background:#050505;
    border:1px solid #222;
    font-size:12px;
    padding:4px;
}

input{
    background:black;
    color:#00ff9c;
    border:1px solid #333;
}

canvas{
    width:100vw;
    height:100vh;
}
</style>
</head>

<body>

<div id="ui">
<input type="file" id="fileInput" accept=".milk">
<div id="log"></div>
</div>

<canvas id="canvas"></canvas>

<script type="module">

import butterchurn from "https://cdn.skypack.dev/butterchurn";

console.log("Starting Milkdrop Loader");

const canvas = document.getElementById("canvas");
const fileInput = document.getElementById("fileInput");
const logBox = document.getElementById("log");

function log(msg){
    console.log(msg);
    logBox.innerHTML += msg + "<br>";
    logBox.scrollTop = logBox.scrollHeight;
}

log("Creating AudioContext");

const audioCtx = new AudioContext();
const analyser = audioCtx.createAnalyser();

log("Creating Butterchurn visualizer");

const visualizer = butterchurn.createVisualizer(audioCtx, canvas, {
    width: window.innerWidth,
    height: window.innerHeight
});

visualizer.connectAudio(analyser);

log("Starting dummy oscillator");

const osc = audioCtx.createOscillator();
osc.type = "sawtooth";
osc.frequency.value = 220;
osc.connect(analyser);
osc.start();

fileInput.addEventListener("change", async e => {

    console.log("File selected");

    const file = e.target.files[0];
    if(!file){
        log("No file selected");
        return;
    }

    log("Loading file: " + file.name);

    const text = await file.text();

    console.log("Preset length:", text.length);

    const preset = {
        preset: text
    };

    try{
        visualizer.loadPreset(preset, 0);
        log("Preset loaded");
    }
    catch(err){
        console.error(err);
        log("ERROR loading preset");
    }

});

let last = performance.now();
let frames = 0;

function render(){

    requestAnimationFrame(render);

    try{
        visualizer.render();
    }catch(e){
        console.error(e);
    }

    frames++;

    const now = performance.now();

    if(now - last > 1000){
        log("FPS: " + frames);
        frames = 0;
        last = now;
    }
}

render();

window.addEventListener("resize", () => {

    console.log("Resize", window.innerWidth, window.innerHeight);

    visualizer.resize(
        window.innerWidth,
        window.innerHeight
    );

});

log("Ready. Load a .milk preset.");

</script>

</body>
</html>
